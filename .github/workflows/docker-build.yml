name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - pwalker/2026-03-02_optimized
    paths:
      - RunpodDockerfile

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: RunpodDockerfile
          push: true
          tags: ghcr.io/vibekernels/modded-nanogpt-vk:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
